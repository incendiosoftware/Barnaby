name: Build GitHub Release Assets

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to upload assets to
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-windows-release:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Build Windows release artifacts
        run: npm run build:release

      - name: Upload release artifacts on release event
        if: ${{ github.event_name == 'release' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload ${{ github.event.release.tag_name }} `
            release\*\Barnaby_*_portable.exe `
            release\*\Barnaby_*_setup.exe `
            --clobber

      - name: Upload release artifacts on manual dispatch
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload ${{ inputs.tag }} `
            release\*\Barnaby_*_portable.exe `
            release\*\Barnaby_*_setup.exe `
            --clobber
