name: Build GitHub Release Assets

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows-release:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Build Windows release artifacts
        run: npm run build:release

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*/Barnaby_*_portable.exe
            release/*/Barnaby_*_setup.exe
